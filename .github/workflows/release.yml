# Build standalone single-file binaries on a version tag and attach them to the GitHub release, so hara
# can be installed without Node (see install.sh). Bun cross-compiles every target from one runner.
name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  packages: write
jobs:
  binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - name: Verify tag matches the package version
        shell: bash
        run: |
          expected="v$(node -p 'require("./package.json").version')"
          [[ "$GITHUB_REF_NAME" == "$expected" ]] || { echo "release tag mismatch: $GITHUB_REF_NAME != $expected" >&2; exit 1; }
          bun --version
      - run: npm ci
      - run: npm audit --omit=dev --registry https://registry.npmjs.org/
      - run: npm test
      - run: npm run build:binaries
      - name: Execute the native release asset before publishing
        shell: bash
        run: |
          expected="$(node -p 'require("./package.json").version')"
          actual="$(dist/bin/hara-linux-x64 --version)"
          [[ "$actual" == "$expected" ]] || { echo "standalone version mismatch: $actual != $expected" >&2; exit 1; }
          dist/bin/hara-linux-x64 --help >/dev/null
          node scripts/standalone-boundary-smoke.mjs dist/bin/hara-linux-x64 "$expected"
      # GitHub-hosted runners already provide gh. Using it directly avoids a third-party action whose
      # deprecated Node runtime is forced forward by the runner, and makes a rerun explicitly idempotent.
      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          assets=(
            dist/bin/hara-darwin-arm64
            dist/bin/hara-darwin-x64
            dist/bin/hara-linux-x64
            dist/bin/hara-linux-arm64
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" --generate-notes --verify-tag
          fi

  # Build + push the container image so `docker run ghcr.io/hara-cli/hara` works after a release.
  image:
    needs: binaries
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/hara-cli/hara
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
