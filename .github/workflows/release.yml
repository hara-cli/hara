# Build standalone single-file binaries on a version tag and attach them to the GitHub release, so hara
# can be installed without Node (see install.sh). Bun cross-compiles every target from one runner.
name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  packages: write
jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - run: npm audit --omit=dev --registry https://registry.npmjs.org/
      - run: npm test
      - run: npm run build:binaries
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/bin/hara-darwin-arm64
            dist/bin/hara-darwin-x64
            dist/bin/hara-linux-x64
            dist/bin/hara-linux-arm64

  # Build + push the container image so `docker run ghcr.io/hara-cli/hara` works after a release.
  image:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/hara-cli/hara
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
