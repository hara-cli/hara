name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["22.12.0", "24"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  legacy-runtime-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Old Node exits with an upgrade instruction
        run: |
          ! node runtime-bootstrap.cjs --version 2>legacy-runtime.err
          grep -q 'requires Node.js 22.12.0 or newer' legacy-runtime.err
          grep -q 'nvm install 22' legacy-runtime.err
