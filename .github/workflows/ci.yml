name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        node: ["22.12.0", "24"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  legacy-runtime-message:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Old Node exits with an upgrade instruction
        run: |
          ! node runtime-bootstrap.cjs --version 2>legacy-runtime.err
          grep -q 'requires Node.js 22.12.0 or newer' legacy-runtime.err
          grep -q 'nvm install 22' legacy-runtime.err

  windows-runtime:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22.12.0"
          cache: npm
      - run: npm ci
      - run: npm run build
      # Keep this lane focused on the Windows contracts that differ from POSIX: portable/Git-Bash HOME
      # selection and deterministic shell discovery outside PATH. The complete suite remains in build-test.
      - run: node --test --test-timeout=120000 test/runtime.test.mjs test/windows-shell.test.mjs

  docker-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Build the complete runtime image
        run: docker build --tag hara-ci .
      - name: Start the guarded entry point
        run: docker run --rm hara-ci --version

  standalone-runtime:
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64-baseline
          - os: ubuntu-24.04-arm
            target: bun-linux-arm64
          - os: macos-15
            target: bun-darwin-arm64
          - os: macos-15-intel
            target: bun-darwin-x64-baseline
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22.12.0"
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - run: npm ci
      - name: Compile and execute the native standalone binary
        shell: bash
        run: |
          bun --version
          npm run build
          bun scripts/build-binary.ts dist/bin/hara "${{ matrix.target }}"
          expected="$(node -p 'require("./package.json").version')"
          actual="$(./dist/bin/hara --version)"
          [[ "$actual" == "$expected" ]] || { echo "standalone version mismatch: $actual != $expected" >&2; exit 1; }
          ./dist/bin/hara --help >/dev/null
          node scripts/standalone-boundary-smoke.mjs ./dist/bin/hara "$expected"
