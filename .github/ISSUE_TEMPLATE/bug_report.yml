name: Bug report
description: Something broke — same structure `hara feedback` files automatically
labels: [feedback, bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you do, what did you expect, what happened instead? Paste errors verbatim.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: hara version
      description: "`hara --version`"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Node
      placeholder: "darwin 25.5.0 arm64 · node v22"
  - type: input
    id: model
    attributes:
      label: Provider / model
      placeholder: "deepseek:deepseek-v4-pro (never paste API keys)"
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
